apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app
  namespace: fitness-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital-app
  template:
    metadata:
      labels:
        app: hospital-app
    spec:
      containers:
      - name: hospital-app
        image: 10kartikey/hospital-management-system-hospital-app:latest
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: MONGO_URI
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: NODE_ENV
        - name: SESSION_SECRET
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: SESSION_SECRET
        - name: JWT_SECRET
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: JWT_SECRET
        - name: ADMIN_USERNAME
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: ADMIN_USERNAME
        - name: ADMIN_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: hospital-config
              key: ADMIN_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-service
  namespace: fitness-ns
spec:
  selector:
    app: hospital-app
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP
